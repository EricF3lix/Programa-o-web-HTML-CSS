<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /* 
           # id
           . class
           : pseudo-class
           :: pseudo-element
            > children
           
        
        
        */
        body{
            font-family: Arial, Helvetica, sans-serif;
            
        }
        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited {
            color: darkred;
        }
        a:hover{
            color: black;
            text-decoration: underline;
        }
        a:active {
            color: yellow;
        }
        a::after {
            content: ' [Link]';
            text-decoration: none;
            font-weight: normal;
            color: darkgrey
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/EricF3lix" target="_blank" rel="external">Repositorio GitHub</a></li>
        <li><a href="https://www.instagram.com/3ric_felix/" target="_blank" rel="external">Instagram</a></li>
        <li><a href="https://www.linkedin.com/in/eric-felix-9685a1390/" target="_blank" rel="external">LinkedIn</a></li>
    </ul>
    
</body>
</html>
